name: Release to App Store

# Builds GitPhotos, signs it via cloud automatic signing (App Store Connect API
# key + -allowProvisioningUpdates), and uploads it to App Store Connect.
on:
  push:
    tags:
      - "v*" # e.g. v1.0.0
  workflow_dispatch:

concurrency:
  group: appstore-release
  cancel-in-progress: false

jobs:
  build-and-upload:
    # macos-26 carries Xcode 26 (iOS 26 SDK), which Apple now requires for uploads.
    # If your account can't see macos-26 yet, switch to "macos-15" — the verify step
    # below will fail fast and tell you if the iOS 26 SDK isn't present.
    runs-on: macos-26
    timeout-minutes: 60

    env:
      PROJECT: GitPhotos.xcodeproj
      SCHEME: GitPhotos
      TEAM_ID: L6LUXM357X

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          # Pick the newest installed Xcode 26.x; fall back to whatever "latest" points at.
          XC=$(ls -d /Applications/Xcode_26* 2>/dev/null | sort -V | tail -1)
          if [ -n "$XC" ]; then sudo xcode-select -s "$XC/Contents/Developer"; fi
          xcodebuild -version

      - name: Verify iOS 26 SDK is available (fail fast if not)
        run: |
          if ! xcodebuild -showsdks | grep -qE "iphoneos2[6-9]"; then
            echo "::error::This runner does not have the iOS 26 SDK. Apple requires it for uploads."
            echo "Fix: keep runs-on at 'macos-26', or update the runner image."
            xcodebuild -showsdks
            exit 1
          fi
          xcodebuild -showsdks | grep iphoneos

      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          mkdir -p "$RUNNER_TEMP/keys"
          printf '%s' "$ASC_API_KEY_P8" > "$RUNNER_TEMP/keys/AuthKey.p8"
          echo "AUTH_KEY_PATH=$RUNNER_TEMP/keys/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Set build number to run number
        run: |
          # Keep every upload's build number unique and monotonic.
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" GitPhotos/Info.plist 2>/dev/null || true
          agvtool new-version -all ${{ github.run_number }} || true

      - name: Archive
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/GitPhotos.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$AUTH_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$TEAM_ID"

      - name: Export & upload to App Store Connect
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/GitPhotos.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ci/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$AUTH_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            ${{ runner.temp }}/export
          if-no-files-found: ignore
