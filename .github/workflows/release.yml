name: Release to App Store

on:
  push:
    tags:
      - "v*" # e.g. v1.0.0
  workflow_dispatch:
    inputs:
      lane:
        description: "Fastlane lane to run"
        required: true
        default: "release"
        type: choice
        options:
          - release # build + upload + submit for review
          - beta    # build + upload to TestFlight only

concurrency:
  group: appstore-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      # App Store Connect API key (used for both signing-free auth and upload)
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
      ASC_KEY_CONTENT_BASE64: "true"
      # Build number is unique per run; offset keeps it monotonic if you re-run.
      BUILD_NUMBER: ${{ github.run_number }}
      # Avoid fastlane interactive prompts / fancy output on CI
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      LC_ALL: en_US.UTF-8
      LANG: en_US.UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_16.2.app

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install signing certificate & provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          # Decode secrets to files
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"

          # Create a temporary keychain and import the distribution certificate
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Make the new keychain the default search list (keep login keychain too)
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Install the provisioning profile
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          UUID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)
          NAME=$(security cms -D -i "$PROFILE_PATH" | plutil -extract Name raw -)
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"

          # Expose values for later steps
          echo "PROVISIONING_PROFILE_NAME=$NAME" >> "$GITHUB_ENV"
          echo "Installed provisioning profile: $NAME ($UUID)"

      - name: Run fastlane
        run: bundle exec fastlane ${{ github.event.inputs.lane || 'release' }}
        env:
          PROVISIONING_PROFILE_NAME: ${{ env.PROVISIONING_PROFILE_NAME }}

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipa-and-logs
          if-no-files-found: ignore
          path: |
            build/*.ipa
            build/*.app.dSYM.zip
            ~/Library/Logs/gym/*.log
