name: GitPhotos
options:
  bundleIdPrefix: com.asray
  deploymentTarget:
    iOS: "17.0"
targets:
  GitPhotos:
    type: application
    platform: iOS
    sources: [GitPhotos]
    info:
      path: GitPhotos/Info.plist
      properties:
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        CFBundleDisplayName: GitPhotos
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.asray.gitphotos
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
